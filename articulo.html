<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leyendo Artículo | Blog</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;0,800;1,400;1,700&display=swap" rel="stylesheet">

    <script>
        // Mantenemos tu misma configuración de diseño
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'plm-bg': '#f4f7f6',
                        'plm-green': '#a8c292',
                        'plm-pink': '#fcd5e3',
                        'plm-blue': '#bde3df',
                        'plm-dark': '#222222',
                    },
                    fontFamily: {
                        'serif': ['"Playfair Display"', 'serif'],
                        'sans': ['"Inter"', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        .grid-bg {
            background-image: 
                linear-gradient(to right, #e2e8f0 1px, transparent 1px),
                linear-gradient(to bottom, #e2e8f0 1px, transparent 1px);
            background-size: 40px 40px;
        }
        
        /* Asegurar que el contenido insertado desde el admin (Quill) sea responsive */
        #article-content img {
            max-width: 100%;
            height: auto;
            border-radius: 0.5rem;
            margin-top: 1.5rem;
            margin-bottom: 1.5rem;
        }
        #article-content iframe {
            max-width: 100%;
            border-radius: 0.5rem;
        }
    </style>
</head>
<body class="bg-plm-bg font-sans text-plm-dark antialiased px-2 md:px-4 py-4 md:py-8 grid-bg">

    <div class="max-w-[800px] mx-auto bg-white border border-plm-dark shadow-2xl overflow-hidden mt-4 md:mt-10">
        
        <header class="flex items-center justify-between px-5 py-4 md:px-8 md:py-6 border-b border-plm-dark">
            <button onclick="window.history.back()" class="text-[10px] md:text-xs font-bold uppercase tracking-widest hover:text-plm-pink transition flex items-center gap-2">
                ← <span class="hidden sm:inline">Regresar</span><span class="sm:hidden">Regresar</span>
            </button>
            <div class="text-xl md:text-2xl font-serif font-bold tracking-tighter">polifonia.</div>
        </header>

        <article class="p-5 sm:p-8 md:p-12 min-h-[500px] relative flex flex-col justify-center">
            
            <div id="loader-container" class="absolute inset-0 flex flex-col items-center justify-center bg-white z-10">
                <div class="font-serif text-4xl md:text-5xl font-bold tracking-tighter mb-4 animate-pulse">polifonia.</div>
                <div class="flex items-center gap-3 text-[10px] md:text-xs font-bold tracking-[0.3em] uppercase text-gray-400">
                    <svg class="animate-spin h-5 w-5 text-plm-pink" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Preparando artículo...
                </div>
            </div>

            <div id="article-wrapper" class="hidden opacity-0 transition-opacity duration-700 h-full w-full">
                <span id="article-category" class="text-[10px] font-bold text-plm-green uppercase tracking-widest mb-2 block"></span>
                <p id="article-author" class="hidden text-[11px] font-semibold text-gray-400 uppercase tracking-widest mb-6" style="display:none">
                    <span id="article-author-name"></span>
                </p>
                
                <h1 id="article-title" class="font-serif text-3xl sm:text-4xl md:text-5xl leading-tight mb-6"></h1>

                <div class="w-full h-48 sm:h-64 md:h-96 bg-gray-100 rounded-lg mb-8 overflow-hidden border border-gray-200">
                    <img id="article-image" src="" alt="Portada del artículo" class="w-full h-full object-cover">
                </div>

                <div id="article-content" class="text-sm md:text-base text-gray-700 leading-relaxed space-y-6"></div>
            </div>

        </article>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="articulo.js"></script>
</body>
</html>
